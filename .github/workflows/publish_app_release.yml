name: app-build-action
#жЋЁйЂЃTagж—¶и§¦еЏ‘
on:
  push:
    tags:
      - "v*"
jobs:
  build-mac-ios-android:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      #з­ѕе‡єд»Јз Ѓ
      - uses: actions/checkout@v4
        with:
          ref: master

      #APKз­ѕеђЌи®ѕзЅ®
      - name: Download Android keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/keystore.jks
        shell: bash
      - name: Create key.properties
        run: |
          echo "storeFile=/tmp/keystore.jks" > simple_live_app/android/key.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> simple_live_app/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> simple_live_app/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> simple_live_app/android/key.properties

      #и®ѕзЅ®JAVAзЋЇеўѓ
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      #и®ѕзЅ®Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # ж‰“ејЂMAC Desktopж”ЇжЊЃ
      - name: Enable Flutter Desktop
        run: flutter config --enable-macos-desktop

      #ж›ґж–°Flutterзљ„packages
      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      # е®‰иЈ…appdmg npm install -g appdmg
      - name: Install appdmg
        run: npm install -g appdmg

      # и®ѕзЅ®flutter_distributorзЋЇеўѓ
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      #ж‰“еЊ…APK
      - name: Build APK
        run: |
          cd simple_live_app
          flutter build apk --release --split-per-abi

      #дёЉдј APKи‡іArtifacts
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk

      #ж‰“еЊ…iOS
      - name: Build IPA
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      #е€›е»єжњЄз­ѕеђЌipa
      - name: Create IPA
        run: |
          cd simple_live_app
          mkdir build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos/
          zip -q -r ios_no_sign.ipa Payload
          cd ../../..

      #дёЉдј IPAи‡іArtifacts
      - name: Upload IPA to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: |
            simple_live_app/build/ios/iphoneos/ios_no_sign.ipa

      # ж‰“еЊ…MAC
      - name: Build MacOS
        run: |
          cd simple_live_app
          flutter_distributor package --platform macos --targets dmg,zip --skip-clean

      # дёЉдј MACи‡іArtifacts
      - name: Upload MacOS to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            simple_live_app/build/dist/*/*.dmg
            simple_live_app/build/dist/*/*.zip

      #иЋ·еЏ–з‰€жњ¬дїЎжЃЇпј€и‡ЄеЉЁд»Ћ Git Tag жЏђеЏ–пј‰
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - name: Echo version
        run: echo "${{ steps.version.outputs.VERSION }}"

      #дёЉдј и‡іRelease
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          token: ${{ secrets.TOKEN }}
          files: |
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/ios/iphoneos/ios_no_sign.ipa
            simple_live_app/build/dist/*/*.dmg
            simple_live_app/build/dist/*/*.zip
      #е®Њж€ђ
      - run: echo "рџЌЏ This job's status is ${{ job.status }}."

  # ж‰“еЊ…Linux
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      # з­ѕе‡єд»Јз Ѓ
      - uses: actions/checkout@v4
        with:
          ref: master
      # и®ѕзЅ®FlutterзЋЇеўѓ
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true
      # е®‰иЈ…дѕќиµ–
      - name: Update apt-get
        run: sudo apt-get update
      - name: Install Dependencies
        run: sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libasound2-dev libmpv-dev mpv
      # ж‰“ејЂLinux Desktopж”ЇжЊЃ
      - name: Enable Flutter Desktop
        run: flutter config --enable-linux-desktop
      # ж›ґж–°Flutterзљ„packages
      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get
      # и®ѕзЅ®flutter_distributorзЋЇеўѓ
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor
      # build Linux ZIP\DMG
      - name: Build Linux
        run: |
          cd simple_live_app
          flutter_distributor package --platform linux --targets deb,zip --skip-clean
      # дёЉдј LinuxеЊ…и‡іArtifacts
      - name: Upload Linux APP to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            simple_live_app/build/dist/*/*.deb
            simple_live_app/build/dist/*/*.zip

      #иЋ·еЏ–з‰€жњ¬дїЎжЃЇпј€и‡ЄеЉЁд»Ћ Git Tag жЏђеЏ–пј‰
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - name: Echo version
        run: echo "${{ steps.version.outputs.VERSION }}"

      #дёЉдј и‡іRelease
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          token: ${{ secrets.TOKEN }}
          files: |
            simple_live_app/build/dist/*/*.deb
            simple_live_app/build/dist/*/*.zip
        #е®Њж€ђ
      - run: echo "рџЌЏ Linux job's status is ${{ job.status }}."

  # ж‰“еЊ…Windows
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      # з­ѕе‡єд»Јз Ѓ
      - uses: actions/checkout@v4
        with:
          ref: master
      # и®ѕзЅ®FlutterзЋЇеўѓ
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true
      - name: Enable Flutter Desktop
        run: flutter config --enable-windows-desktop
      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get
      # и®ѕзЅ®flutter_distributorзЋЇеўѓ
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor
      # build Windows ZIP\MSIX
      - name: Build Windows
        run: |
          cd simple_live_app
          flutter_distributor package --platform windows --targets msix,zip --skip-clean

      # дёЉдј Windowsи‡іArtifacts
      - name: Upload Windows APP to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            simple_live_app/build/dist/*/*.msix
            simple_live_app/build/dist/*/*.zip

      #иЋ·еЏ–з‰€жњ¬дїЎжЃЇпј€и‡ЄеЉЁд»Ћ Git Tag жЏђеЏ–пј‰
      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - name: Echo version
        run: echo "${{ steps.version.outputs.VERSION }}"

      #дёЉдј и‡іRelease
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          token: ${{ secrets.TOKEN }}
          files: |
            simple_live_app/build/dist/*/*.msix
            simple_live_app/build/dist/*/*.zip

      #е®Њж€ђ
      - run: echo "рџЌЏ Windows job's status is ${{ job.status }}."
